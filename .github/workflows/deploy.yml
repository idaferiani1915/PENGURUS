name: Auto Deploy to Fedora

on:
  push:
    branches: [ "main" ] # Ganti dengan branch utama kamu jika berbeda (misal: master)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          version: latest

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 100.79.215.75 >> ~/.ssh/known_hosts

      - name: Deploy to Server via SSH
        run: |
          ssh -i ~/.ssh/id_rsa bagusdev@100.79.215.75 << 'EOF'
            # Masuk ke direktori project di server Fedora kamu
            cd /var/www/PENGURUS
            
            # Tarik update terbaru dari git
            git pull origin main
            
            # Tambahkan perintah tambahan di sini jika diperlukan, contoh:
            # npm install
            # npm run build
            # sudo systemctl restart namaservice
            
            echo "Deploy ke server Fedora berhasil!"
          EOF