name: Auto Deploy to Fedora

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.98.8

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 100.79.215.75 >> ~/.ssh/known_hosts

      - name: Deploy to Server via SSH
        run: |
          ssh -i ~/.ssh/id_rsa bagusdev@100.79.215.75 << 'EOF'
            cd /var/www/PENGURUS
            git pull origin main
            
            # Tambahkan perintah build/restart service di sini jika ada
            
            echo "Deploy ke server Fedora berhasil!"
          EOF